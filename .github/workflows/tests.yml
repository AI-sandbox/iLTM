name: Tests

on:
  push:
    branches:
      - "main"
      - "dev"
  pull_request:
    branches:
      - '*'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install dependencies
      run: |
        uv pip install --system tox tox-gh-actions
    - name: Cache model checkpoints
      if: runner.os != 'Linux'
      uses: actions/cache@v4
      with:
        path: ~/.cache/iltm
        key: iltm-checkpoints-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          iltm-checkpoints-${{ runner.os }}-
    - name: Clean ILTM cache on Linux
      if: runner.os == 'Linux'
      run: rm -rf ~/.cache/iltm || true

    - name: Run tests
      env:
        TOX_WORK_DIR: ${{ github.workspace }}/.tox
        PIP_NO_CACHE_DIR: "1"
      run: python -m tox

